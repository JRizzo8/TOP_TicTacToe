<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="borders.css">

    <title>TOP Tic-Tic-Toe</title>
</head>
<body>
    <page-container>
        <header>
            <h1>Tic-Tac-Toe</h1>
            <button class="playBtn">Play Game</button>
            <Score-board>
                <player1-score>
                    <h2>Player 1 Score</h2>
                    <h3 class="player1UiScore">0</h3>
                </player1-score>
                <game-Rounds>
                    <h2>Game Rounds</h2>
                    <h3 class="uiGameRounds">0</h3>
                </game-Rounds>
                <player2-score>
                    <h2>Player 2 Score</h2>
                    <h3 class="player2UiScore">0</h3>
                </player2-score>
            </Score-board>
        </header>
        <game-container>
            <game-board>
                <game-square data-row="0" data-col="0" id="border00" class="cell"></game-square>
                <game-square data-row="0" data-col="1" id="border01" class="cell"></game-square>
                <game-square data-row="0" data-col="2" id="border02" class="cell"></game-square>
                <game-square data-row="1" data-col="0" id="border10" class="cell"></game-square>
                <game-square data-row="1" data-col="1" id="border11" class="cell"></game-square>
                <game-square data-row="1" data-col="2" id="border12" class="cell"></game-square>
                <game-square data-row="2" data-col="0" id="border20" class="cell"></game-square>
                <game-square data-row="2" data-col="1" id="border21" class="cell"></game-square>
                <game-square data-row="2" data-col="2" id="border22" class="cell"></game-square>
            </game-board>
        </game-container>


        <!-- modal dialogs -->
        <dialog class="gameStartDialog">
            <button type="button" class="startDialogCloseBtn">X</button>
            <h1>Welcome</h1>
            <p>Choose Player Options</p>
            <form class="startForm">
                <form-left class="formLeft">
                    <ai-checkbox>
                        <input type="checkbox" id="player1AiMode">
                        <label for="player1AiMode">Check here for Ai Player 1</label>
                    </ai-checkbox>
                    <label for="player1NameInput">Player 1 Name</label>
                    <input type="text" id="player1NameInput" class="player1NameBox">
                </form-left>
                <form-right class="formRight">
                    <ai-checkbox>
                        <input type="checkbox" id="player2AiMode">
                        <label for="player2AiMode">Check here for Ai Player 2</label>
                    </ai-checkbox>
                    <label for="player2NameInput">Player 2 Name</label>
                    <input type="text" id="player2NameInput" class="player2NameBox">
                </form-right>
                <form-btn class="formSubmit">
                    <input type="submit" class="submitPlayerOptions" value="Play">
                </form-btn>
            </form>
        </dialog>
        <dialog class="endGameDialog">
            <h1>Game Over!</h1>
            <h1 class="endGameText"></h1>
            <endButtons-container>
                <button type="button" class="playAgainBtn">Play Again</button><button type="button" class="resetBtn">Reset Game</button>
            </endButtons-container>
        </dialog>
        <footer>
            <button type="button" class="resetBtn" id="footerResetBtn">Reset Game</button>
        </footer>
    </page-container>
    <script src="script.js"></script>
</body>
</html>
